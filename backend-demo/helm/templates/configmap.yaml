apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gaussian-backend-demo.fullname" . }}-config
  labels:
    {{- include "gaussian-backend-demo.labels" . | nindent 4 }}
data:
  DATABASE_URL: {{ .Values.database.url | quote }}
  SERVER_HOST: {{ .Values.server.host | quote }}
  SERVER_PORT: {{ .Values.server.port | quote }}
  SSL_CERT_FILE: {{ .Values.tls.certFile | quote }}
  SSL_KEY_FILE: {{ .Values.tls.keyFile | quote }}
  {{- range $key, $value := .Values.extraEnv }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
